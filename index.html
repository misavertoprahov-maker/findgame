<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Сафари</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
        }

        .task {
            font-size: 20px;
            font-weight: bold;
            background-color: black;
            color: white;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .game-container {
            position: relative;
            width: 800px;
            height: 600px;
            margin: 0 auto;
            border: 4px solid #333;
            overflow: hidden;
        }

        .background-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .character {
            position: absolute;
            width: 120px; /* Немного увеличим размер для африканских животных */
            cursor: pointer;
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>

    <h1>Сафари: Поиск животных Африки</h1>
    <div class="task" id="task-text">Найди животное...</div>

    <div class="game-container">
        <!-- Фон с просторами Африки -->
        <img src="fon.jpg" alt="Саванна" class="background-img">

        <!-- Африканские животные -->
        <img src="lion.png" alt="Лев" class="character" data-name="lion">
        <img src="elephant.png" alt="Слон" class="character" data-name="elephant">
        <img src="giraffe.png" alt="Жираф" class="character" data-name="giraffe">
        <img src="monkey.png" alt="Обезьяна" class="character" data-name="monkey">
    </div>

    <script>
        const characters = document.querySelectorAll('.character');
        const taskText = document.getElementById('task-text');
        
        // Названия африканских животных на английском языке
        const names = ['lion', 'elephant', 'giraffe', 'monkey'];
        const targetName = names[Math.floor(Math.random() * names.length)];
        
        taskText.textContent = 'Найди животное ' + targetName;

        characters.forEach(char => {
            // Размещаем животных в произвольных местах на фоне саванны
            const randomX = Math.floor(Math.random() * 700);
            const randomY = Math.floor(Math.random() * 200) + 300; 
            
            char.style.left = randomX + 'px';
            char.style.top = randomY + 'px';

            char.addEventListener('click', function() {
                if (char.getAttribute('data-name') === targetName) {
                    alert('Поздравляем! Ты нашел ' + targetName + '! 🎉');
                    location.reload();
                } else {
                    alert('Это не тот! Ищи ' + targetName);
                }
            });
        });
    </script>

</body>
</html>
