<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Поиск предметов</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
        }

        .task {
            font-size: 20px;
            font-weight: bold;
            background-color: black;
            color: white;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .game-container {
            position: relative;
            width: 800px;
            height: 600px;
            margin: 0 auto;
            border: 4px solid #333;
            overflow: hidden;
        }

        .background-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .character {
            position: absolute;
            width: 100px;
            cursor: pointer;
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>

    <h1>Колло бОк</h1>
    <div class="task" id="task-text">Найди персонаж...</div>

    <div class="game-container">
        <img src="forest.jpg" alt="Лес" class="background-img">

        <img src="volk.png" alt="Волк" class="character" data-name="volk">
        <img src="zayac.png" alt="Заяц" class="character" data-name="zayac">
        <img src="lisa.png" alt="Лиса" class="character" data-name="lisa">
        <img src="medved.png" alt="Медведь" class="character" data-name="medved">
    </div>

    <script>
        const characters = document.querySelectorAll('.character');
        const taskText = document.getElementById('task-text');
        
        const names = ['volk', 'zayac', 'lisa', 'medved'];
        const targetName = names[Math.floor(Math.random() * names.length)];
        
        taskText.textContent = 'Найди персонаж ' + targetName;

        characters.forEach(char => {
            const randomX = Math.floor(Math.random() * 700);
            const randomY = Math.floor(Math.random() * 200) + 300; 
            
            char.style.left = randomX + 'px';
            char.style.top = randomY + 'px';

            char.addEventListener('click', function() {
                if (char.getAttribute('data-name') === targetName) {
                    alert('Поздравляем! Ты нашли нужного персонажа! 🎉');
                    location.reload();
                } else {
                    alert('Это не тот персонаж! Ищи ' + targetName);
                }
            });
        });
    </script>

</body>
</html>
